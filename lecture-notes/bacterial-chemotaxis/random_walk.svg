<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
  <defs>
    <style>
      .path-random { fill: none; stroke: #8BBF9F; stroke-width: 3; stroke-linejoin: round; }
      .path-biased { fill: none; stroke: #8BBF9F; stroke-width: 3; stroke-linejoin: round; }
      .bacterium { fill: #2C4C3B; }
      .food { fill: #D9534F; opacity: 0.6; }
      .text-title { font-family: sans-serif; fill: #333; font-size: 18px; font-weight: bold; text-anchor: middle; }
    </style>
  </defs>

  <!-- LEFT SIDE: Random Walk -->
  <g transform="translate(50, 50)">
    <path d="M 50 150 L 80 120 L 60 80 L 100 60 L 130 90 L 160 50 L 200 80 L 180 130 L 220 160 L 160 180 L 130 140 L 90 170" class="path-random" />
    <rect x="85" y="165" width="12" height="6" rx="3" transform="rotate(-30 90 170)" class="bacterium" />
    <text x="135" y="230" class="text-title">Random Walk</text>
  </g>

  <!-- RIGHT SIDE: Biased Random Walk -->
  <g transform="translate(400, 50)">
    <!-- Food Gradient (Dots increasing in density) -->
    <g class="food">
      <!-- Sparse -->
      <circle cx="20" cy="80" r="3"/><circle cx="40" cy="150" r="3"/><circle cx="50" cy="40" r="3"/>
      <!-- Medium -->
      <circle cx="120" cy="60" r="3"/><circle cx="140" cy="110" r="3"/><circle cx="110" cy="160" r="3"/><circle cx="160" cy="140" r="3"/><circle cx="180" cy="70" r="3"/>
      <!-- Dense -->
      <circle cx="220" cy="50" r="3"/><circle cx="230" cy="90" r="3"/><circle cx="210" cy="130" r="3"/><circle cx="240" cy="170" r="3"/><circle cx="260" cy="60" r="3"/><circle cx="270" cy="100" r="3"/><circle cx="250" cy="140" r="3"/><circle cx="280" cy="180" r="3"/><circle cx="290" cy="70" r="3"/><circle cx="310" cy="110" r="3"/><circle cx="300" cy="150" r="3"/><circle cx="320" cy="90" r="3"/><circle cx="330" cy="130" r="3"/>
    </g>

    <!-- Path (Longer segments moving right) -->
    <path d="M 0 120 L 50 110 L 40 80 L 120 90 L 130 140 L 210 110 L 190 70 L 290 100" class="path-biased" />
    <rect x="285" y="97" width="12" height="6" rx="3" transform="rotate(15 290 100)" class="bacterium" />
    <text x="165" y="230" class="text-title">Biased Random Walk</text>
  </g>
</svg>
